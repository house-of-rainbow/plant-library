# ---------------------------------------------------------------------------
# Burien Station Plant Library — multistage Azure DevOps pipeline
#
#   Stage 1  DeployInfrastructure infra.bicep — env, Cosmos, Storage, Key Vault,
#                                 user-assigned identity (ACR is external)
#   Stage 2  BuildBackend         docker build on agent -> push to central ACR
#   Stage 3  BuildFrontend        docker build on agent -> push to central ACR
#   Stage 4  DeployApps           app.bicep — container apps (needs 1, 2, 3)
#   Stage 5  CustomDomains        Cloudflare DNS + managed certs (optional)
#
# Infra provisions everything except the apps; secrets live in Key Vault and are
# referenced by the apps via the shared user-assigned identity. Images are built
# on the agent and pushed to the pre-existing central ACR, then app.bicep deploys
# the container apps referencing all infra resources as existing.
#
# Prerequisites:
#   * An ARM service connection named by `azureServiceConnection` below.
#   * A secret pipeline variable `ENTRA_CLIENT_SECRET` (may be empty) — consumed
#     by infra.bicepparam / app.bicepparam via readEnvironmentVariable.
#   * For custom domains: a variable group `cloudflare-api` containing a secret
#     `CLOUDFLARE_API_TOKEN` (Zone.DNS edit permission), plus the domain details
#     in deploy/config.json (customDomains).
#   * Bicep is invoked through the Azure CLI task (not dedicated Bicep tasks).
# ---------------------------------------------------------------------------

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - backend/**
      - frontend/**
      - deploy/**
      - mcp/**

variables:
  - group: cloudflare-api # provides the secret CLOUDFLARE_API_TOKEN (used by the CustomDomains stage)
  - group: plant-library-secrets # provides the secret ENTRA_CLIENT_SECRET (used by the DeployInfrastructure stage)
  - group: plants-external-services
  - name: azureServiceConnection
    value: 'sc-sp-DEPLOY-plant-library' # <-- set to your ARM service connection name
  - name: vmImage
    value: 'ubuntu-latest'
  - name: backendImageName
    value: 'plant-backend'
  - name: frontendImageName
    value: 'plant-frontend'
  - name: mcpImageName
    value: 'plant-mcp'
  - name: imageTag
    value: '$(Build.BuildId)'

stages:
  # -------------------------------------------------------------------------
  - stage: DeployInfrastructure
    displayName: '1 · Deploy infrastructure'
    dependsOn: []
    jobs:
      - job: infra
        pool:
          vmImage: $(vmImage)
        steps:
          - checkout: self
          - task: AzureCLI@2
            name: deployInfra
            displayName: 'Deploy Bicep (Azure CLI)'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                RG=$(jq -r '.resourceGroupName' deploy/config.json)
                LOC=$(jq -r '.location' deploy/config.json)
                DEPLOYMENT="plantlib-$(Build.BuildId)"

                echo "Ensuring resource group '$RG' in '$LOC'..."
                az group create --name "$RG" --location "$LOC" --output none

                echo "Deploying infrastructure..."
                az deployment group create \
                  --resource-group "$RG" \
                  --name "$DEPLOYMENT" \
                  --template-file deploy/bicep/infra.bicep \
                  --parameters deploy/bicep/infra.bicepparam \
                  --output none

                OUT=$(az deployment group show \
                  --resource-group "$RG" \
                  --name "$DEPLOYMENT" \
                  --query properties.outputs -o json)

                set_out () {
                  local var="$1"; local key="$2"
                  local val
                  val=$(echo "$OUT" | jq -r ".${key}.value")
                  echo "##vso[task.setvariable variable=${var};isOutput=true]${val}"
                  echo "  ${var} = ${val}"
                }

                echo "##vso[task.setvariable variable=rgName;isOutput=true]${RG}"
                set_out acrName acrName
                set_out acrLoginServer acrLoginServer
                set_out backendAppName backendAppName
                set_out frontendAppName frontendAppName
                set_out mcpAppName mcpAppName
                set_out managedEnvironmentName managedEnvironmentName
            env:
              ENTRA_CLIENT_SECRET: $(ENTRA_CLIENT_SECRET)
              PLANT_DOT_NET__API_KEY: $(PLANT_DOT_NET__API_KEY)
              OPENAI_API_KEY: $(OPENAI_API_KEY)
              MCP_API_KEYS: $(MCP_API_KEYS)

  # -------------------------------------------------------------------------
  - stage: BuildBackend
    displayName: '2 · Build backend'
    dependsOn: []
    jobs:
      - job: build
        pool:
          vmImage: $(vmImage)
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: 'Build backend image and push to ACR'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                ACR_NAME=$(jq -r '.acr.name' deploy/config.json)
                ACR_SUB=$(jq -r '.acr.subscriptionId' deploy/config.json)
                ACR_LOGIN_SERVER="${ACR_NAME}.azurecr.io"
                az acr login --name "$ACR_NAME" --subscription "$ACR_SUB"
                docker build -t "${ACR_LOGIN_SERVER}/$(backendImageName):$(imageTag)" ./backend
                docker push "${ACR_LOGIN_SERVER}/$(backendImageName):$(imageTag)"

  # -------------------------------------------------------------------------
  - stage: BuildFrontend
    displayName: '3 · Build frontend'
    dependsOn: []
    jobs:
      - job: build
        pool:
          vmImage: $(vmImage)
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: 'Build frontend image and push to ACR'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                ACR_NAME=$(jq -r '.acr.name' deploy/config.json)
                ACR_SUB=$(jq -r '.acr.subscriptionId' deploy/config.json)
                ACR_LOGIN_SERVER="${ACR_NAME}.azurecr.io"
                az acr login --name "$ACR_NAME" --subscription "$ACR_SUB"
                docker build -t "${ACR_LOGIN_SERVER}/$(frontendImageName):$(imageTag)" ./frontend
                docker push "${ACR_LOGIN_SERVER}/$(frontendImageName):$(imageTag)"

  # -------------------------------------------------------------------------
  - stage: BuildMcp
    displayName: '3b · Build MCP server'
    dependsOn: []
    jobs:
      - job: build
        pool:
          vmImage: $(vmImage)
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: 'Build MCP image and push to ACR'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                ACR_NAME=$(jq -r '.acr.name' deploy/config.json)
                ACR_SUB=$(jq -r '.acr.subscriptionId' deploy/config.json)
                ACR_LOGIN_SERVER="${ACR_NAME}.azurecr.io"
                az acr login --name "$ACR_NAME" --subscription "$ACR_SUB"
                # Build context is the repo root so the MCP image can reuse backend/app.
                docker build -f mcp/Dockerfile -t "${ACR_LOGIN_SERVER}/$(mcpImageName):$(imageTag)" .
                docker push "${ACR_LOGIN_SERVER}/$(mcpImageName):$(imageTag)"

  # -------------------------------------------------------------------------
  - stage: DeployApps
    displayName: '4 · Deploy container apps'
    dependsOn:
      - DeployInfrastructure
      - BuildBackend
      - BuildFrontend
      - BuildMcp
    variables:
      rgName: $[ stageDependencies.DeployInfrastructure.infra.outputs['deployInfra.rgName'] ]
      acrLoginServer: $[ stageDependencies.DeployInfrastructure.infra.outputs['deployInfra.acrLoginServer'] ]
    jobs:
      - job: deploy
        pool:
          vmImage: $(vmImage)
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: 'Deploy container apps (app.bicep)'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az deployment group create \
                  --resource-group "$(rgName)" \
                  --name "plantlib-apps-$(Build.BuildId)" \
                  --template-file deploy/bicep/app.bicep \
                  --parameters deploy/bicep/app.bicepparam \
                  --output none
                echo "Container apps deployed."
            env:
              BACKEND_IMAGE: '$(acrLoginServer)/$(backendImageName):$(imageTag)'
              FRONTEND_IMAGE: '$(acrLoginServer)/$(frontendImageName):$(imageTag)'
              MCP_IMAGE: '$(acrLoginServer)/$(mcpImageName):$(imageTag)'
              ENTRA_CLIENT_SECRET: $(ENTRA_CLIENT_SECRET)
              PLANT_DOT_NET__API_KEY: $(PLANT_DOT_NET__API_KEY)
              OPENAI_API_KEY: $(OPENAI_API_KEY)
              MCP_API_KEYS: $(MCP_API_KEYS)

  # -------------------------------------------------------------------------
  # 6 · Custom domains + Cloudflare DNS + Azure managed (ACME) certificates.
  #     Skipped automatically when customDomains.enabled is false in config.json.
  #     For each configured domain:
  #       a) create asuid TXT + CNAME in Cloudflare (update_cloudflare_dns.py)
  #       b) register the custom domain on the Container App (unbound)
  #       c) provision an Azure managed certificate (CNAME-validated, via Bicep)
  #       d) SNI-bind the certificate to the domain
  #     Managed certs are reused on re-runs and auto-renewed by Azure.
  # -------------------------------------------------------------------------
  - stage: CustomDomains
    displayName: '5 · Custom domains & certificates'
    dependsOn:
      - DeployInfrastructure
      - DeployApps
    variables:
      rgName: $[ stageDependencies.DeployInfrastructure.infra.outputs['deployInfra.rgName'] ]
      backendAppName: $[ stageDependencies.DeployInfrastructure.infra.outputs['deployInfra.backendAppName'] ]
      frontendAppName: $[ stageDependencies.DeployInfrastructure.infra.outputs['deployInfra.frontendAppName'] ]
      mcpAppName: $[ stageDependencies.DeployInfrastructure.infra.outputs['deployInfra.mcpAppName'] ]
      managedEnvironmentName: $[ stageDependencies.DeployInfrastructure.infra.outputs['deployInfra.managedEnvironmentName'] ]
    jobs:
      - job: customDomains
        pool:
          vmImage: $(vmImage)
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: 'Configure Cloudflare DNS + managed certificates'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az extension add --name containerapp --upgrade --only-show-errors -y || true

                CFG=deploy/config.json
                ENABLED=$(jq -r '.customDomains.enabled // false' "$CFG")
                if [ "$ENABLED" != "true" ]; then
                  echo "customDomains.enabled is not true — skipping custom domain setup."
                  exit 0
                fi

                RG="$(rgName)"
                ENV_NAME="$(managedEnvironmentName)"
                COUNT=$(jq '.customDomains.apps | length' "$CFG")
                DOMAINS_FOR_BICEP='[]'

                app_container_name () {
                  case "$1" in
                    frontend) echo "$(frontendAppName)" ;;
                    backend)  echo "$(backendAppName)" ;;
                    mcp)      echo "$(mcpAppName)" ;;
                    *) echo "" ;;
                  esac
                }

                # --- (a) Cloudflare DNS + (b) register custom domain ---
                for i in $(seq 0 $((COUNT - 1))); do
                  APP=$(jq -r ".customDomains.apps[$i].app" "$CFG")
                  DNS=$(jq -r ".customDomains.apps[$i].dnsName" "$CFG")
                  ZONE_NAME=$(jq -r ".customDomains.apps[$i].cloudflareZoneName" "$CFG")
                  ZONE_ID=$(jq -r ".customDomains.apps[$i].cloudflareZoneId" "$CFG")

                  if [ -z "$DNS" ] || [ "$DNS" = "null" ]; then
                    echo "No dnsName for '$APP' — skipping."
                    continue
                  fi

                  APP_NAME=$(app_container_name "$APP")
                  if [ -z "$APP_NAME" ]; then
                    echo "Unknown app '$APP' in customDomains.apps." >&2
                    exit 1
                  fi

                  FQDN=$(az containerapp show -g "$RG" -n "$APP_NAME" \
                    --query "properties.configuration.ingress.fqdn" -o tsv)
                  VERIFICATION=$(az containerapp show -g "$RG" -n "$APP_NAME" \
                    --query "properties.customDomainVerificationId" -o tsv)

                  echo "Configuring $DNS -> $APP_NAME ($FQDN)"

                  ENTRY=$(jq -n --arg dns "$DNS" --arg zn "$ZONE_NAME" --arg zid "$ZONE_ID" \
                    '{dnsName:$dns, cloudflareZoneName:$zn, cloudflareZoneId:$zid}')
                  DEP_FILE=$(mktemp)
                  jq -n --argjson e "$ENTRY" '{appDeployments:[$e]}' > "$DEP_FILE"
                  FQDNS=$(jq -n --arg dns "$DNS" --arg fqdn "$FQDN" \
                    '[{customDomain:$dns, defaultFqdn:$fqdn}]')

                  python3 deploy/scripts/update_cloudflare_dns.py \
                    --app-deployments-file "$DEP_FILE" \
                    --verification-token "$VERIFICATION" \
                    --app-fqdns-json "$FQDNS"
                  rm -f "$DEP_FILE"

                  # Register the custom domain (unbound). Retry to allow DNS to propagate.
                  for attempt in 1 2 3 4 5; do
                    if az containerapp hostname add -g "$RG" -n "$APP_NAME" \
                        --hostname "$DNS" --only-show-errors; then
                      break
                    fi
                    echo "hostname add attempt $attempt failed (DNS may still be propagating); retrying..."
                    sleep 20
                  done

                  CERT_NAME="cert-${DNS//./-}"
                  DOMAINS_FOR_BICEP=$(echo "$DOMAINS_FOR_BICEP" \
                    | jq --arg d "$DNS" --arg c "$CERT_NAME" '. + [{dnsName:$d, certificateName:$c}]')
                done

                if [ "$DOMAINS_FOR_BICEP" = "[]" ]; then
                  echo "No domains to provision certificates for."
                  exit 0
                fi

                # --- (c) Provision managed certificates via Bicep (idempotent/reused) ---
                PARAM_FILE=$(mktemp)
                jq -n --arg env "$ENV_NAME" --argjson domains "$DOMAINS_FOR_BICEP" \
                  '{"$schema":"https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#","contentVersion":"1.0.0.0","parameters":{environmentName:{value:$env},domains:{value:$domains}}}' \
                  > "$PARAM_FILE"

                az deployment group create \
                  --resource-group "$RG" \
                  --name "plantlib-certs-$(Build.BuildId)" \
                  --template-file deploy/bicep/customdomain.bicep \
                  --parameters @"$PARAM_FILE" \
                  --output none
                rm -f "$PARAM_FILE"

                # --- (d) SNI-bind each certificate to its domain ---
                for i in $(seq 0 $((COUNT - 1))); do
                  APP=$(jq -r ".customDomains.apps[$i].app" "$CFG")
                  DNS=$(jq -r ".customDomains.apps[$i].dnsName" "$CFG")
                  if [ -z "$DNS" ] || [ "$DNS" = "null" ]; then continue; fi
                  APP_NAME=$(app_container_name "$APP")
                  CERT_NAME="cert-${DNS//./-}"

                  az containerapp hostname bind -g "$RG" -n "$APP_NAME" \
                    --hostname "$DNS" \
                    --environment "$ENV_NAME" \
                    --certificate "$CERT_NAME" \
                    --validation-method CNAME \
                    --only-show-errors || echo "hostname bind: already bound for $DNS"
                  echo "Bound $DNS -> $APP_NAME (SNI, managed cert $CERT_NAME)"
                done
            env:
              CLOUDFLARE_API_TOKEN: $(CLOUDFLARE_API_TOKEN)
